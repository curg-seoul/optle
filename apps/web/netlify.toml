# Netlify config for the frontend.
#
# Set these in the Netlify UI (Site settings → Environment variables) — they are
# build-time vars, kept out of the repo:
#   VITE_API_BASE                 the deployed backend URL, e.g. https://api.yourdomain
#   VITE_WALLETCONNECT_PROJECT_ID (optional) WalletConnect / mobile-wallet QR
#
# The frontend calls VITE_API_BASE directly (cross-origin; the backend allows CORS
# and the X-PAYMENT header), so no API proxy rewrite is needed here.

[build]
  base = "apps/web"
  command = "npm run build"
  publish = "dist"

# SPA fallback: serve index.html for client-side routes (e.g. /app).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
