# Netlify config for the frontend (custom domain: optle.hanjun.kim).
#
# The browser calls /api and /health as same-origin relative paths. These proxy
# rewrites forward them server-side to the Tencent Cloud backend, so there is no
# CORS preflight and the custom X-PAYMENT header works unchanged.
#
# Set VITE_WALLETCONNECT_PROJECT_ID in the Netlify UI (Site settings → Env vars)
# if you want WalletConnect / mobile-wallet QR in the RainbowKit modal.

[build]
  base = "apps/web"
  command = "npm run build"
  publish = "dist"

# API proxy → backend (must come before the SPA fallback).
[[redirects]]
  from = "/api/*"
  to = "https://api.optle.hanjun.kim/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://api.optle.hanjun.kim/health"
  status = 200
  force = true

# SPA fallback: serve index.html for client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
